<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Inspiration News</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:transparent;
  color:#1a1a1a;
  padding:4px;
}

.status{
  font-size:12px;
  color:#999;
  padding:8px 0;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:16px;
}

.card{
  background:#fff;
  border:1px solid #e5e5e5;
  border-radius:10px;
  overflow:hidden;
  text-decoration:none;
  color:inherit;
  display:flex;
  flex-direction:column;
  transition:all .15s ease;
}

.card:hover{
  border-color:#bbb;
  box-shadow:0 4px 16px rgba(0,0,0,.08);
}

.card-img{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
  background:#f2f2f2;
}

.card-body{
  padding:14px 16px 16px;
  display:flex;
  flex-direction:column;
  gap:8px;
  flex:1;
}

.card-title{
  font-size:14px;
  font-weight:600;
  line-height:1.4;
  color:#111;
}

.card-excerpt{
  font-size:12.5px;
  color:#555;
  line-height:1.55;
  flex:1;
}

.card-meta{
  font-size:11.5px;
  color:#888;
}

.view-all{
  text-align:center;
  margin-top:20px;
}

.view-all a{
  display:inline-block;
  padding:8px 18px;
  border:1px solid #ddd;
  border-radius:6px;
  text-decoration:none;
  color:#444;
  font-size:13px;
}

.view-all a:hover{
  background:#f5f5f5;
}
</style>
</head>

<body>

<p class="status" id="status">Loading...</p>

<div class="grid" id="grid"></div>

<div class="view-all">
  <a href="https://www.pixelinspiration.com/news" target="_blank" rel="noopener">
    View all posts →
  </a>
</div>

<script>
async function load() {

  const grid = document.getElementById('grid');
  const status = document.getElementById('status');

  try {

    const response = await fetch(
      'https://rss.app/feeds/P9XoBnx8K6Tg92FF.json'
    );

    if (!response.ok) {
      throw new Error('HTTP ' + response.status);
    }

    const data = await response.json();

    let items = data.items || [];

    // ENGLISH ONLY
    items = items.filter(item => {
      const url = item.url || '';

      return (
        !url.includes('/fr/') &&
        !url.includes('/nl/')
      );
    });

    status.textContent =
      'Loaded ' + items.length + ' English posts';

    items.forEach(item => {

      const link = item.url || '#';
      const title = item.title || '';
      const author =
        item.authors?.[0]?.name ||
        item.author ||
        'Pixel Inspiration';

      const date = item.date_published
        ? new Date(item.date_published).toLocaleDateString(
            'en-GB',
            {
              day:'numeric',
              month:'short',
              year:'numeric'
            }
          )
        : '';

      let image = '';

      if (item.image) {
        image = item.image;
      } else if (item.banner_image) {
        image = item.banner_image;
      } else if (item.content_html) {

        const temp = document.createElement('div');
        temp.innerHTML = item.content_html;

        const img = temp.querySelector('img');

        if (img) {
          image = img.src || '';
        }
      }

      const excerptSource =
        item.content_text ||
        item.summary ||
        '';

      const excerpt =
        excerptSource.length > 120
          ? excerptSource.slice(0,120) + '...'
          : excerptSource;

      const card = document.createElement('a');

      card.className = 'card';
      card.href = link;
      card.target = '_blank';
      card.rel = 'noopener noreferrer';

      if (image) {

        const img = document.createElement('img');

        img.className = 'card-img';
        img.src = image;
        img.loading = 'lazy';
        img.alt = title;

        card.appendChild(img);
      }

      const body = document.createElement('div');
      body.className = 'card-body';

      body.innerHTML = `
        <div class="card-title">${title}</div>
        <div class="card-excerpt">${excerpt}</div>
        <div class="card-meta">
          ${date}${author ? ' · ' + author : ''}
        </div>
      `;

      card.appendChild(body);

      grid.appendChild(card);

    });

    if (!items.length) {
      status.textContent =
        'No English posts found.';
    }

  } catch (error) {

    status.textContent =
      'Error loading feed';

    grid.innerHTML = `
      <p style="font-size:13px;color:#888">
        Could not load feed.
      </p>
    `;

    console.error(error);
  }
}

load();
</script>

</body>
</html>
