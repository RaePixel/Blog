<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Inspiration News</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: transparent; color: #1a1a1a; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; padding: 4px; }
  .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; text-decoration: none; color: inherit; transition: box-shadow 0.15s, border-color 0.15s; }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); border-color: #bbb; }
  .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: #f0f0f0; }
  .card-body { padding: 14px 16px 16px; display: flex; flex-direction: column; flex: 1; gap: 8px; }
  .card-title { font-size: 14px; font-weight: 600; line-height: 1.4; color: #111; }
  .card-excerpt { font-size: 12.5px; color: #555; line-height: 1.55; flex: 1; }
  .card-meta { font-size: 11.5px; color: #888; }
  .view-all { text-align: center; margin-top: 20px; padding-bottom: 4px; }
  .view-all a { font-size: 13px; color: #444; text-decoration: none; border: 1px solid #ddd; border-radius: 6px; padding: 7px 18px; display: inline-block; transition: background 0.15s; }
  .view-all a:hover { background: #f5f5f5; }
  .error { font-size: 13px; color: #888; padding: 1rem 0; }
</style>
</head>
<body>
<div class="grid" id="grid"></div>
<div class="view-all">
  <a href="https://www.pixelinspiration.com/news" target="_blank" rel="noopener">View all posts →</a>
</div>
<script>
function extractImg(html) {
  const match = html && html.match(/<img[^>]+src="([^"]+)"/);
  return match ? match[1] : '';
}

async function load() {
  const grid = document.getElementById('grid');
  try {
    const res = await fetch('https://rss.app/feeds/P9XoBnx8K6Tg92FF.json');
    const data = await res.json();
    const items = data.items || [];
    if (!items.length) throw new Error('No posts');
    items.forEach(item => {
      const link = item.url || '#';
      const excerpt = (item.content_text || '').slice(0, 120) + '…';
      const img = extractImg(item.content_html);
      const date = item.date_published ? new Date(item.date_published).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : '';
      const author = (item.authors && item.authors[0]?.name) || 'Pixel Inspiration';
      const a = document.createElement('a');
      a.className = 'card';
      a.href = link;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.innerHTML = (img ? `<img src="${img}" alt="" loading="lazy">` : '')
        + `<div class="card-body">
            <div class="card-title">${item.title || ''}</div>
            <div class="card-excerpt">${excerpt}</div>
            <div class="card-meta">${date}${author ? ' · ' + author : ''}</div>
           </div>`;
      grid.appendChild(a);
    });
  } catch(e) {
    grid.innerHTML = '<p class="error">Could not load posts. <a href="https://www.pixelinspiration.com/news" target="_blank">Visit the blog →</a></p>';
  }
}
load();
</script>
</body>
</html>
